plugins {
    id 'java'
    id 'application'
    id 'com.diffplug.spotless' version '6.25.0'
}

group 'com.github.shk0da'
version '1.0'

sourceCompatibility = 11

repositories {
    mavenCentral()
}

dependencies {
    implementation 'ru.tinkoff.piapi:java-sdk-core:1.5'
    implementation 'com.google.code.gson:gson:2.8.9'
    implementation 'org.jsoup:jsoup:1.15.3'
    implementation 'com.tictactec:ta-lib:0.4.0'
    implementation 'org.jfree:jfreechart:1.0.19'
}

spotless {
    java {
        target 'src/**/*.java'
        googleJavaFormat('1.19.2').aosp()
        removeUnusedImports()
        trimTrailingWhitespace()
        endWithNewline()
        cleanthat()

        // Ensure line length matches IDEA settings (120 chars)
        targetExclude '**/generated/**'

        // Enforce 4 spaces indentation (no tabs)
        indentWithSpaces(4)
    }
}

task uberJar(type: Jar) {
    manifest {
        attributes 'Main-Class': 'com.github.shk0da.goldendragon.GoldenDragon'
    }

    from { sourceSets.main.output }
    dependsOn { configurations.runtimeClasspath }
    from {
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        configurations.runtimeClasspath.filter { it.name.endsWith("jar") }.collect { zipTree(it) }
    }
}

task dataCollect(type: JavaExec) {
    group = 'data'
    description = 'Collect historical market data for stocks and crypto'
    main = 'com.github.shk0da.goldendragon.strategy.DataCollector'
    classpath = sourceSets.main.runtimeClasspath
    workingDir = rootDir
}

task runBacktest(type: JavaExec) {
    main = 'com.github.shk0da.goldendragon.test.BacktestRunner'
    classpath = sourceSets.test.runtimeClasspath
    workingDir = rootDir
    jvmArgs '--add-opens', 'java.base/java.time=ALL-UNNAMED'

    // Support both single strategy and all strategies
    def strategyName = project.findProperty('strategy')
    if (strategyName) {
        args strategyName
    }
    if (project.hasProperty('leverage')) {
        systemProperty 'unifiedTrader.leverage', project.property('leverage')
    }
    if (project.hasProperty('backtestMode')) {
        systemProperty 'backtest.mode', project.property('backtestMode')
    }
}

task runMlTraining(type: JavaExec) {
    main = 'com.github.shk0da.goldendragon.ml.MlModelTrainer'
    classpath = sourceSets.main.runtimeClasspath
    workingDir = rootDir

    if (project.hasProperty('data')) {
        args '--data', project.property('data')
    }
    if (project.hasProperty('output')) {
        args '--output', project.property('output')
    }
    if (project.hasProperty('reportDir')) {
        args '--report-dir', project.property('reportDir')
    }
    if (project.hasProperty('ticker')) {
        args '--ticker', project.property('ticker')
    }

    if (!project.hasProperty('data')) {
        args '--data', 'ml_strategy/data_pipeline/trades.csv'
    }
    if (!project.hasProperty('output')) {
        args '--output', 'ml_strategy/models/trade_classifier_v2.txt'
    }
    if (!project.hasProperty('reportDir')) {
        args '--report-dir', 'ml_strategy'
    }
}

task trainAllTickers {
    group = 'ml'
    description = 'Train per-ticker ML models for all tickers'

    doLast {
        def tradesFile = file('ml_strategy/data_pipeline/trades.csv')
        if (!tradesFile.exists()) {
            throw new GradleException('Trades file not found. Run generateModel first.')
        }

        // Extract unique tickers from trades.csv
        def tickers = tradesFile.readLines().drop(1).collect { line ->
            def parts = line.split(',')
            return parts.length > 1 ? parts[1].trim() : null
        }.findAll { it != null && !it.isEmpty() }.unique()

        println "Found ${tickers.size()} tickers: ${tickers.join(', ')}"

        def successful = 0
        def failed = 0

        tickers.each { ticker ->
            println "\n=========================================="
            println "Training model for ticker: $ticker"
            println "=========================================="

            try {
                javaexec {
                    main = 'com.github.shk0da.goldendragon.ml.MlModelTrainer'
                    classpath = sourceSets.main.runtimeClasspath
                    workingDir = rootDir
                    args '--data', 'ml_strategy/data_pipeline/trades.csv'
                    args '--output', "ml_strategy/models/trade_classifier_${ticker}.txt"
                    args '--report-dir', 'ml_strategy'
                    args '--ticker', ticker
                }
                successful++
            } catch (Exception e) {
                println "Failed to train model for $ticker: ${e.message}"
                failed++
            }
        }

        println "\n=========================================="
        println "Training complete!"
        println "Successful: $successful, Failed: $failed"
        println "=========================================="
    }
}

task generateModel {
    group = 'ml'
    description = 'Run backtest and train ML model.'
    dependsOn 'runBacktest', 'runMlTraining', 'trainAllTickers'
}

runMlTraining.mustRunAfter runBacktest
trainAllTickers.mustRunAfter runBacktest

task runTCSServiceSmokeTest(type: JavaExec) {
    main = 'com.github.shk0da.goldendragon.test.TCSServiceSmokeTest'
    classpath = sourceSets.test.runtimeClasspath
    workingDir = rootDir
}

task runUnifiedStrategySmokeTest(type: JavaExec) {
    main = 'com.github.shk0da.goldendragon.test.UnifiedStrategySmokeTest'
    classpath = sourceSets.test.runtimeClasspath
    workingDir = rootDir
}

task runStrategy(type: JavaExec) {
    main = 'com.github.shk0da.goldendragon.GoldenDragon'
    classpath = sourceSets.test.runtimeClasspath
    workingDir = rootDir
    jvmArgs '--add-opens', 'java.base/java.time=ALL-UNNAMED'
    def strategyName = project.findProperty('strategy') ?: 'RegimeAwareStrategy'
    args strategyName
}
