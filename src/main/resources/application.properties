##### OrderBook Scalp Config #####
# Comma-separated tickers, or ALL for screened tradable RUB perpetual futures
orderBookScalp.instruments=ALL
orderBookScalp.enabledSignals=obi,tradeFlow,microprice
orderBookScalp.depth=10
# paperMode=false sends real orders via Tinkoff API (sandbox if tcs.isSandbox=true)
orderBookScalp.paperMode=false
orderBookScalp.positionCash=50000
# Universe screening (ALL mode): top-N by book depth + flow, MOEX perpetuals only;
# excludes qual-investor-only instruments when account is not qualified
orderBookScalp.screeningTopN=10
orderBookScalp.screeningMinTopDepth=40
orderBookScalp.screeningMinBookDepth=150
orderBookScalp.screeningBookLevels=5
orderBookScalp.screeningNearestContracts=3
orderBookScalp.rescreenMinutes=60
orderBookScalp.commissionRate=0.0005
# Entry filters tuned for >60% win rate
orderBookScalp.obiThreshold=0.45
orderBookScalp.obiExitThreshold=-0.25
orderBookScalp.edgeSpreadFraction=0.5
orderBookScalp.maxSpreadBps=8
orderBookScalp.persistenceTicks=5
orderBookScalp.obiLevels=5
orderBookScalp.minBestLevelQty=2
orderBookScalp.minTradeFlow=10
# TP must cover round-trip commission; SL wider than before
orderBookScalp.takeProfitSpreads=3.0
orderBookScalp.stopLossSpreads=1.5
orderBookScalp.entryGraceSeconds=3
orderBookScalp.maxHoldSeconds=90
orderBookScalp.cooldownSeconds=45
orderBookScalp.tradeFlowWindowSeconds=5
# Enable to record data/<TICKER>/ticks.txt for future replay backtests
tcs.marketData.writeTicks=false
